<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#faf7f0" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Notas" />
  <title>Notas</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json" />

  <!-- Apple Touch Icons -->
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Estilos (ordem importa: global → dashboard → editor) -->
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="stylesheet" href="css/editor.css" />
</head>
<body>

  <!-- CABEÇALHO DO APP -->
  <header class="app-header">
    <h1 class="app-title">minhas notas</h1>
    <span class="note-count" id="noteCount">0 notas</span>
  </header>

  <!-- DASHBOARD — Grid de notas -->
  <main class="dashboard" id="dashboard"></main>

  <!-- TELA CHEIA DE EDIÇÃO -->
  <div class="editor-overlay" id="editorOverlay" aria-hidden="true">
    <div class="editor-panel">

      <div class="editor-toolbar">
        <div class="editor-colors" id="editorColors"></div>
        <button class="btn-close" id="btnCloseEditor" aria-label="Fechar editor">✕</button>
      </div>

      <div class="editor-paper">
        <textarea
          class="editor-textarea"
          id="editorTextarea"
          placeholder="Escreva aqui…"
          spellcheck="true"
          autofocus
        ></textarea>
      </div>

      <div class="editor-footer">
        <button class="btn-delete" id="btnDeleteNote">Apagar nota</button>
        <button class="btn-save" id="btnSaveNote">Salvar</button>
      </div>

    </div>
  </div>

  <!-- BOTÃO FLUTUANTE "+" -->
  <button class="fab" id="fabNew" aria-label="Nova nota">+</button>

  <!-- SCRIPTS (ordem: serviços → componentes → maestro) -->
  <script src="js/services/storage.js"></script>
  <script src="js/components/noteCard.js"></script>
  <script src="js/components/editorMenu.js"></script>
  <script src="js/app.js"></script>

  <!-- PWA — Service Worker + Install -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('[PWA] SW registrado:', reg.scope))
          .catch(err => console.warn('[PWA] SW falhou:', err));
      });
    }

    let _installPrompt = null;

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      _installPrompt = e;

      const btn = document.createElement('button');
      btn.id = 'btnInstall';
      btn.textContent = '⬇ Instalar app';
      btn.style.cssText = `
        font-family: var(--font-ui);
        font-size: 0.75rem;
        font-weight: 500;
        padding: 6px 14px;
        border-radius: 99px;
        border: 1.5px solid var(--color-border);
        background: var(--color-surface);
        color: var(--color-ink-light);
        cursor: pointer;
        margin-left: auto;
        transition: all 0.2s;
        white-space: nowrap;
      `;
      btn.addEventListener('mouseenter', () => {
        btn.style.borderColor = 'var(--color-ink)';
        btn.style.color = 'var(--color-ink)';
      });
      btn.addEventListener('mouseleave', () => {
        btn.style.borderColor = 'var(--color-border)';
        btn.style.color = 'var(--color-ink-light)';
      });
      btn.addEventListener('click', async () => {
        if (!_installPrompt) return;
        _installPrompt.prompt();
        const { outcome } = await _installPrompt.userChoice;
        if (outcome === 'accepted') btn.remove();
        _installPrompt = null;
      });

      document.querySelector('.app-header').appendChild(btn);
    });

    window.addEventListener('appinstalled', () => {
      document.getElementById('btnInstall')?.remove();
      _installPrompt = null;
    });
  </script>

</body>
</html>
