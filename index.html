<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#faf7f0" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Notas" />
  <title>Notas</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="stylesheet" href="css/editor.css" />
</head>
<body>

  <header class="app-header">
    <div class="app-header__top">
      <h1 class="app-title">minhas notas</h1>
      <span class="note-count" id="noteCount">0 notas</span>
    </div>
    <div class="app-toolbar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="search" class="search-input" id="searchInput"
               placeholder="Buscar notas…" autocomplete="off" />
        <button class="search-clear" id="searchClear" aria-label="Limpar">✕</button>
      </div>
      <div class="view-toggle">
        <button class="view-btn is-active" id="btnGrid" title="Grid">⊞</button>
        <button class="view-btn" id="btnList" title="Lista">☰</button>
      </div>
    </div>
  </header>

  <main class="dashboard" id="dashboard"></main>

  <!-- EDITOR -->
  <div class="editor-overlay" id="editorOverlay" aria-hidden="true">
    <div class="editor-panel">

      <!-- Cores -->
      <div class="editor-toolbar">
        <div class="editor-colors" id="editorColors"></div>
        <button class="btn-close" id="btnCloseEditor" aria-label="Fechar">✕</button>
      </div>

      <!-- Título -->
      <div class="editor-title-wrap" id="editorTitleWrap">
        <input type="text" class="editor-title-input" id="editorTitle"
               placeholder="Título (opcional)" maxlength="60" autocomplete="off" />
      </div>

      <!-- Foto: preview + botões -->
      <div class="editor-photo-section" id="editorPhotoSection">
        <img class="editor-photo-preview" id="photoPreview" alt="Foto da nota" />
        <button class="btn-remove-photo" id="btnRemovePhoto" aria-label="Remover foto">✕</button>
        <div class="editor-photo-actions">
          <button class="btn-photo" id="btnCamera">📷 Câmera</button>
          <button class="btn-photo" id="btnGallery">🖼 Galeria</button>
        </div>
      </div>

      <!-- Texto pautado -->
      <div class="editor-paper">
        <textarea class="editor-textarea" id="editorTextarea"
                  placeholder="Escreva aqui…" spellcheck="true"></textarea>
      </div>

      <!-- Lembrete -->
      <div class="editor-reminder-section">
        <div class="reminder-row">
          <label class="reminder-label" for="reminderInput">⏰ Lembrete</label>
          <span class="reminder-display" id="reminderDisplay"></span>
          <button class="btn-clear-reminder" id="btnClearReminder" aria-label="Remover lembrete">✕</button>
        </div>
        <input type="datetime-local" class="reminder-input" id="reminderInput" />
      </div>

      <!-- Rodapé -->
      <div class="editor-footer">
        <button class="btn-delete" id="btnDeleteNote">Apagar nota</button>
        <button class="btn-save"   id="btnSaveNote">Salvar</button>
      </div>

    </div>
  </div>

  <button class="fab" id="fabNew" aria-label="Nova nota">+</button>

  <!-- Scripts (ordem importa) -->
  <script src="js/services/storage.js"></script>
  <script src="js/services/push.js"></script>
  <script src="js/services/photo.js"></script>
  <script src="js/components/noteCard.js"></script>
  <script src="js/components/editorMenu.js"></script>
  <script src="js/app.js"></script>

  <!-- PWA -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(r => console.log('[PWA] SW:', r.scope))
          .catch(e => console.warn('[PWA] SW falhou:', e));
      });
    }
    let _ip = null;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault(); _ip = e;
      const btn = document.createElement('button');
      btn.textContent = '⬇ Instalar';
      btn.style.cssText = `
        font-family:var(--font-ui);font-size:.75rem;font-weight:500;
        padding:6px 14px;border-radius:99px;border:1.5px solid var(--color-border);
        background:var(--color-surface);color:var(--color-ink-light);
        cursor:pointer;transition:all .2s;white-space:nowrap;
      `;
      btn.onclick = async () => {
        _ip.prompt();
        const {outcome} = await _ip.userChoice;
        if (outcome === 'accepted') btn.remove();
        _ip = null;
      };
      document.querySelector('.app-header__top').appendChild(btn);
    });
    window.addEventListener('appinstalled', () => {
      document.getElementById('btnInstall')?.remove();
    });
  </script>

</body>
</html>
